<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#000308"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NEON RIFT"/>
<link rel="manifest" href="manifest.json"/>
<title>NEON RIFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#00ffff;   /* cyan  */
  --c2:#ff00ff;   /* magenta */
  --c3:#ffff00;   /* yellow */
  --c4:#00ff88;   /* green */
  --red:#ff2244;
  --bg:#000308;
  --orb:'Orbitron',sans-serif;
  --mono:'Share Tech Mono',monospace;
}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:var(--mono);user-select:none;-webkit-tap-highlight-color:transparent;}

/* ── Fullscreen camera ── */
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;
  filter:saturate(0.6) brightness(0.55) contrast(1.2);}

/* ── Game canvas (all rendering on top of video) ── */
#game-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}

/* ── Hidden processing canvas ── */
#proc-canvas{display:none;}

/* ── Tap capture overlay ── */
#tap-layer{position:fixed;inset:0;z-index:3;cursor:crosshair;}

/* ── HUD ── */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;}

/* Top bar */
#top-bar{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:48px 18px 0;
}
.hud-block{display:flex;flex-direction:column;gap:2px;}
.hud-label{font-size:8px;letter-spacing:2.5px;color:rgba(0,255,255,0.45);text-transform:uppercase;}
.hud-val{font-family:var(--orb);font-size:22px;font-weight:900;
  color:var(--c1);text-shadow:0 0 14px var(--c1),0 0 28px rgba(0,255,255,0.4);
  line-height:1;}
.hud-val.magenta{color:var(--c2);text-shadow:0 0 14px var(--c2),0 0 28px rgba(255,0,255,0.4);}
.hud-val.yellow{color:var(--c3);text-shadow:0 0 14px var(--c3);}

/* Score comboflash */
#combo-flash{
  position:fixed;top:120px;left:50%;transform:translateX(-50%);
  font-family:var(--orb);font-size:28px;font-weight:900;
  color:var(--c3);text-shadow:0 0 20px var(--c3),0 0 40px rgba(255,255,0,0.5);
  pointer-events:none;z-index:20;
  opacity:0;transition:opacity 0.1s;
  white-space:nowrap;
}
#combo-flash.show{opacity:1;}

/* Health bar */
#health-bar-wrap{
  position:fixed;bottom:110px;left:18px;right:18px;z-index:10;pointer-events:none;
}
.bar-label{font-size:8px;letter-spacing:2px;color:rgba(0,255,255,0.5);margin-bottom:4px;}
#health-bar-track{height:4px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;}
#health-bar-fill{height:100%;border-radius:100px;
  background:linear-gradient(90deg,var(--c1),var(--c2));
  box-shadow:0 0 8px var(--c1);
  transition:width 0.3s ease,background 0.5s;}
#health-bar-fill.danger{background:linear-gradient(90deg,var(--red),#ff6622);box-shadow:0 0 8px var(--red);}

/* Ammo pips */
#ammo-row{
  position:fixed;bottom:78px;left:18px;right:18px;z-index:10;pointer-events:none;
  display:flex;align-items:center;gap:6px;
}
.ammo-label{font-size:8px;letter-spacing:2px;color:rgba(0,255,255,0.5);margin-right:4px;}
/* energy bar built dynamically in JS */

/* Bottom controls */
#bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px 28px;
  background:linear-gradient(to top,rgba(0,3,8,0.85),transparent);
  pointer-events:all;
}
.ctrl{
  width:58px;height:58px;border-radius:50%;border:1px solid;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;letter-spacing:1px;font-family:var(--mono);
  cursor:pointer;transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.ctrl:active{transform:scale(0.9);}
#btn-scan{border-color:rgba(0,255,255,0.4);color:var(--c1);background:rgba(0,255,255,0.05);}
#btn-scan.active{border-color:var(--c1);background:rgba(0,255,255,0.15);
  box-shadow:0 0 16px rgba(0,255,255,0.4);}
#btn-fire{
  width:78px;height:78px;
  border-color:var(--c2);color:var(--c2);background:rgba(255,0,255,0.08);
  box-shadow:0 0 20px rgba(255,0,255,0.25);font-size:9px;
}
#btn-fire:active{background:rgba(255,0,255,0.25);box-shadow:0 0 30px rgba(255,0,255,0.6);}
#btn-reload{border-color:rgba(0,255,136,0.4);color:var(--c4);background:rgba(0,255,136,0.05);}

/* Wave announce */
#wave-banner{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:50;pointer-events:none;text-align:center;
  opacity:0;transition:opacity 0.3s;
}
#wave-banner.show{opacity:1;}
#wave-title{
  font-family:var(--orb);font-size:42px;font-weight:900;
  color:var(--c2);text-shadow:0 0 30px var(--c2),0 0 60px rgba(255,0,255,0.5);
  letter-spacing:4px;
}
#wave-sub{
  font-size:12px;color:var(--c1);letter-spacing:3px;margin-top:6px;
  text-shadow:0 0 10px var(--c1);
}

/* Game over screen */
#game-over{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,3,8,0.88);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;opacity:0;pointer-events:none;transition:opacity 0.5s;
}
#game-over.show{opacity:1;pointer-events:all;}
#go-title{font-family:var(--orb);font-size:48px;font-weight:900;
  color:var(--red);text-shadow:0 0 30px var(--red),0 0 60px rgba(255,34,68,0.4);
  letter-spacing:4px;}
#go-score{font-family:var(--orb);font-size:22px;color:var(--c1);
  text-shadow:0 0 14px var(--c1);}
#go-best{font-size:11px;color:rgba(0,255,255,0.5);letter-spacing:2px;}
#go-restart{
  margin-top:12px;padding:14px 40px;
  border:1px solid var(--c2);border-radius:4px;
  background:rgba(255,0,255,0.08);
  font-family:var(--orb);font-size:12px;font-weight:700;letter-spacing:3px;
  color:var(--c2);cursor:pointer;
  box-shadow:0 0 20px rgba(255,0,255,0.3);
  transition:all 0.2s;
}
#go-restart:active{background:rgba(255,0,255,0.2);}

/* Permission / start screen */
#start-screen{
  position:fixed;inset:0;z-index:200;
  background:#000308;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;padding:36px;text-align:center;
}
#start-screen.hidden{display:none;}
#ss-title{
  font-family:var(--orb);font-size:44px;font-weight:900;
  color:var(--c1);letter-spacing:6px;
  text-shadow:0 0 30px var(--c1),0 0 60px rgba(0,255,255,0.4);
}
#ss-sub{font-size:12px;color:var(--c2);letter-spacing:3px;text-shadow:0 0 10px var(--c2);}
#ss-body{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.8;max-width:300px;margin-top:6px;}
#ss-body b{color:var(--c1);}
#ss-start{
  margin-top:10px;padding:16px 48px;
  border:1px solid var(--c1);border-radius:4px;
  background:rgba(0,255,255,0.06);
  font-family:var(--orb);font-size:13px;font-weight:700;letter-spacing:3px;
  color:var(--c1);cursor:pointer;
  box-shadow:0 0 24px rgba(0,255,255,0.25);
  transition:all 0.2s;
}
#ss-start:active{background:rgba(0,255,255,0.15);}
/* CRT scanlines */
#start-screen::after,body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(to bottom,
    transparent 0px,transparent 2px,
    rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
}

/* Scan sensitivity pill */
#scan-pill{
  position:fixed;top:108px;right:14px;z-index:10;pointer-events:none;
  display:flex;flex-direction:column;align-items:flex-end;gap:3px;
}
#scan-pill .sp-label{font-size:7px;letter-spacing:1.5px;color:rgba(0,255,255,0.35);text-transform:uppercase;}
#scan-pill .sp-val{font-size:9px;color:var(--c4);}
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="proc-canvas"></canvas>
<canvas id="game-canvas"></canvas>
<div id="tap-layer"></div>

<!-- HUD -->
<div id="hud">
  <div id="top-bar">
    <div class="hud-block">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="hud-score">0</div>
    </div>
    <div class="hud-block" style="align-items:center;">
      <div class="hud-label">Wave</div>
      <div class="hud-val magenta" id="hud-wave">1</div>
    </div>
    <div class="hud-block" style="align-items:flex-end;">
      <div class="hud-label">Best</div>
      <div class="hud-val yellow" id="hud-best">0</div>
    </div>
  </div>

  <div id="scan-pill">
    <div class="sp-label">Radar</div>
    <div class="sp-val" id="scan-pct">0.0%</div>
  </div>
</div>

<div id="combo-flash"></div>

<div id="health-bar-wrap">
  <div class="bar-label">SHIELD</div>
  <div id="health-bar-track"><div id="health-bar-fill" style="width:100%"></div></div>
</div>

<div id="ammo-row">
  <span class="ammo-label">AMMO</span>
</div>

<div id="bottom-bar">
  <div class="ctrl" id="btn-scan" onclick="toggleScan()">MAP</div>
  <div class="ctrl" id="btn-fire" onclick="fireWeapon()">FIRE</div>
  <div class="ctrl" id="btn-reload" onclick="powerShot()" title="Power Shot">NOVA</div>
</div>

<!-- Wave banner -->
<div id="wave-banner">
  <div id="wave-title">WAVE 1</div>
  <div id="wave-sub">MOTION DETECTED — DEFEND YOUR SPACE</div>
</div>

<!-- Game over -->
<div id="game-over">
  <div id="go-title">FLATLINED</div>
  <div id="go-score">SCORE: <span id="go-score-val">0</span></div>
  <div id="go-best">BEST: <span id="go-best-val">0</span></div>
  <button id="go-restart" onclick="restartGame()">INSERT COIN</button>
</div>

<!-- Start screen -->
<div id="start-screen">
  <div id="ss-title">NEON RIFT</div>
  <div id="ss-sub">A R   S H O O T E R</div>
  <p id="ss-body">
    Your <b>real environment</b> is the battlefield.<br>
    Motion in the room <b>spawns enemies</b>.<br>
    Tap enemies to shoot. Stay alive.<br><br>
    Camera access required.
  </p>
  <button id="ss-start" onclick="startGame()">JACK IN</button>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   NEON RIFT — AR Shooter v3
   - Enemies always visible, spawn from all 4 edges
   - Player / crosshair at SCREEN CENTRE
   - SCAN button = radar minimap showing all incoming enemies
   - Real camera motion zones bias enemy spawn positions
═══════════════════════════════════════════════════════════ */

const gc    = document.getElementById('game-canvas');
const ctx   = gc.getContext('2d');
const proc  = document.getElementById('proc-canvas');
const pctx  = proc.getContext('2d', { willReadFrequently: true });
const video = document.getElementById('video');
const tapLayer = document.getElementById('tap-layer');

function resizeCanvas(){ gc.width=window.innerWidth; gc.height=window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Player is always dead centre ───────────────────────────
function px(){ return gc.width/2; }
function py(){ return gc.height/2; }

// ── State ──────────────────────────────────────────────────
let gameActive=false, radarOpen=false;
let score=0, bestScore=parseInt(localStorage.getItem('neonrift_best')||'0');
let wave=1, health=100, lastDamageTime=0;
const SHIELD_DELAY    = 4000;  // ms after last hit before recharge begins
const SHIELD_RECHARGE = 0.04;  // hp per frame (~2.4hp/s at 60fps)
let combo=0, comboTimer=null, waveAdvancing=false;

// ── Energy weapon — drains while firing, recharges when released ──
let energy       = 100;       // current charge 0–100
const ENERGY_MAX = 100;
const ENERGY_DRAIN    = 1.8;  // per frame while firing
const ENERGY_RECHARGE = 0.55; // per frame while not firing (gradual)
const ENERGY_MIN_FIRE = 8;    // must have at least this to start firing
let isFiring     = false;     // is the player currently holding fire
let fireHeld     = false;     // pointer/touch held down
let lastShotTime = 0;
const FIRE_RATE  = 120;       // ms between shots while held
const enemies=[], bullets=[], particles=[], scanRings=[], floaters=[], waveTimeouts=[];

// ── Motion detection state ─────────────────────────────────
let prevFrame=null, warmup=0, lastProc=0;
const PROC_MS=180;
const motionZones=[];

// ── Enemy types ────────────────────────────────────────────
const ENEMY_TYPES=[
  {name:'CRAWLER', hp:1, spd:1.0, size:20, color:'#00ffff', pts:10,  shape:'diamond', dmg:8 },
  {name:'GRUNT',   hp:2, spd:1.3, size:26, color:'#ff00ff', pts:25,  shape:'hex',     dmg:14},
  {name:'BRUTE',   hp:5, spd:0.8, size:36, color:'#ff2244', pts:50,  shape:'square',  dmg:25},
  {name:'WRAITH',  hp:1, spd:2.0, size:16, color:'#ffff00', pts:40,  shape:'tri',     dmg:10},
  {name:'SENTINEL',hp:8, spd:0.6, size:48, color:'#ff6600', pts:100, shape:'star',    dmg:35},
];

// ── Energy bar (replaces ammo pips) ────────────────────────
function buildEnergyBar(){
  const row=document.getElementById('ammo-row');
  row.innerHTML=`
    <span class="ammo-label" id="energy-label">ENERGY</span>
    <div id="energy-track" style="flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;margin:0 6px;">
      <div id="energy-fill" style="height:100%;width:100%;border-radius:100px;background:linear-gradient(90deg,#ff00ff,#00ffff);box-shadow:0 0 8px #ff00ff;transition:background 0.3s;"></div>
    </div>
    <span id="energy-pct" style="font-family:'Share Tech Mono';font-size:10px;color:#ff00ff;min-width:32px;text-align:right;">100%</span>
  `;
}
buildEnergyBar();

function updateEnergyBar(){
  const pct=Math.max(0,energy)/ENERGY_MAX;
  const fill=document.getElementById('energy-fill');
  const label=document.getElementById('energy-pct');
  if(!fill||!label) return;
  fill.style.width=(pct*100)+'%';
  if(energy<ENERGY_MIN_FIRE){
    fill.style.background='#ff2244';
    fill.style.boxShadow='0 0 6px #ff2244';
    label.style.color='#ff2244';
    label.textContent='LOW';
  } else if(isFiring){
    fill.style.background='linear-gradient(90deg,#ff00ff,#ffffff)';
    fill.style.boxShadow='0 0 12px #ff00ff';
    label.style.color='#ff00ff';
    label.textContent=Math.round(pct*100)+'%';
  } else {
    fill.style.background='linear-gradient(90deg,#ff00ff,#00ffff)';
    fill.style.boxShadow='0 0 8px #ff00ff';
    label.style.color='#ff00ff';
    label.textContent=Math.round(pct*100)+'%';
  }
}
updateEnergyBar();
document.getElementById('hud-best').textContent=bestScore;
document.getElementById('go-best-val').textContent=bestScore;

// ── Start / restart ────────────────────────────────────────
function startGame(){
  document.getElementById('start-screen').classList.add('hidden');
  navigator.mediaDevices.getUserMedia({audio:false,
    video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
  }).then(stream=>{
    video.srcObject=stream;
    video.onloadeddata=()=>{
      video.play();
      proc.width =Math.round(video.videoWidth /4)||160;
      proc.height=Math.round(video.videoHeight/4)||90;
      initGame();
    };
  }).catch(()=>initGame());
}

function initGame(){
  gameActive=true; wave=1; score=0; health=100; lastDamageTime=0;
  combo=0; waveAdvancing=false;
  energy=ENERGY_MAX; isFiring=false; fireHeld=false;
  enemies.length=0; bullets.length=0; particles.length=0;
  floaters.length=0; scanRings.length=0;
  waveTimeouts.forEach(clearTimeout); waveTimeouts.length=0;
  updateHUD(); updateEnergyBar(); updateRadarBtn();
  showWaveBanner(1);
  setTimeout(()=>spawnWave(1),2400);
  requestAnimationFrame(gameLoop);
}

function restartGame(){
  document.getElementById('game-over').classList.remove('show');
  initGame();
}

// ── Wave spawning — all 4 edges ────────────────────────────
function spawnWave(w){
  if(!gameActive) return;
  const count=4+w*3;
  const stagger=Math.max(150, 550-w*30);
  for(let i=0;i<count;i++){
    waveTimeouts.push(
      setTimeout(()=>{ if(gameActive) spawnEnemyFromEdge(w,i,count); },
        i*stagger+Math.random()*180)
    );
  }
}

function spawnEnemyFromEdge(w,idx,total){
  const W=gc.width, H=gc.height;
  let x,y;
  const zone=motionZones.find(z=>z.age<4000);
  if(zone&&Math.random()<0.4){
    const zx=(zone.x+zone.w/2)*(W/proc.width);
    const zy=(zone.y+zone.h/2)*(H/proc.height);
    const dL=zx,dR=W-zx,dT=zy,dB=H-zy;
    const m=Math.min(dL,dR,dT,dB);
    if(m===dL)     {x=-35;y=Math.max(0,Math.min(H,zy+(Math.random()-.5)*80));}
    else if(m===dR){x=W+35;y=Math.max(0,Math.min(H,zy+(Math.random()-.5)*80));}
    else if(m===dT){x=Math.max(0,Math.min(W,zx+(Math.random()-.5)*80));y=-35;}
    else           {x=Math.max(0,Math.min(W,zx+(Math.random()-.5)*80));y=H+35;}
  } else {
    const edge=idx%4;
    if(edge===0)     {x=Math.random()*W; y=-40;}
    else if(edge===1){x=W+40;            y=Math.random()*H;}
    else if(edge===2){x=Math.random()*W; y=H+40;}
    else             {x=-40;             y=Math.random()*H;}
  }

  const pool=ENEMY_TYPES.slice(0,Math.min(ENEMY_TYPES.length,1+Math.floor(w/2)));
  const weights=pool.map((_,i)=>Math.max(1,pool.length-i));
  const totalW=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*totalW, type=pool[pool.length-1];
  for(let i=0;i<pool.length;i++){r-=weights[i];if(r<=0){type=pool[i];break;}}

  // Aim toward player (centre)
  const ang=Math.atan2(py()-y,px()-x)+(Math.random()-.5)*0.7;
  const spd=(type.spd+w*0.1)*(0.85+Math.random()*0.3);

  enemies.push({
    x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    hp:type.hp+Math.floor(w/2), maxHp:type.hp+Math.floor(w/2),
    size:type.size, color:type.color, pts:type.pts+w*5,
    shape:type.shape, name:type.name, dmg:type.dmg+w*2,
    rot:0, rotSpd:(Math.random()-.5)*0.06,
    age:0, alive:true, hitFlash:0, spawnFlash:0,
    bobPhase:Math.random()*Math.PI*2,
  });
}

// ── Radar toggle ───────────────────────────────────────────
function toggleScan(){
  if(!gameActive) return;
  radarOpen=!radarOpen;
  updateRadarBtn();
}
function updateRadarBtn(){
  document.getElementById('btn-scan').classList.toggle('active',radarOpen);
  document.getElementById('btn-scan').textContent=radarOpen?'MAP ▲':'MAP';
  document.getElementById('scan-pct').textContent='';
}

// ── Weapon ─────────────────────────────────────────────────
// FIRE button: hold-to-fire handled by pointer events on tapLayer
// This is a single-shot fallback for the button itself
function fireWeapon(){
  if(!gameActive||energy<ENERGY_MIN_FIRE) return;
  shootOnce(px(),py()-100); // shoot upward as default
}

function getNearestEnemy(){
  let best=null, bestD=Infinity;
  for(const en of enemies){
    if(!en.alive) continue;
    const d=Math.hypot(en.x-px(),en.y-py());
    if(d<bestD){bestD=d;best=en;}
  }
  return best;
}

// Hold to fire — pointer events for continuous shooting
tapLayer.addEventListener('pointerdown',(e)=>{
  if(!gameActive) return;
  fireHeld=true; isFiring=true;
  tapLayer.setPointerCapture(e.pointerId);
  // Store aim target
  tapLayer._aimX=e.clientX; tapLayer._aimY=e.clientY;
  // Immediate first shot
  if(energy>=ENERGY_MIN_FIRE) shootOnce(e.clientX, e.clientY);
});
tapLayer.addEventListener('pointermove',(e)=>{
  if(fireHeld){ tapLayer._aimX=e.clientX; tapLayer._aimY=e.clientY; }
});
tapLayer.addEventListener('pointerup',(e)=>{
  fireHeld=false; isFiring=false;
});
tapLayer.addEventListener('pointercancel',(e)=>{
  fireHeld=false; isFiring=false;
});

function shootOnce(tx, ty){
  if(energy<ENERGY_MIN_FIRE){ isFiring=false; return; }
  energy-=ENERGY_DRAIN*3; // one shot costs 3x drain rate (same feel)
  updateEnergyBar();
  fireBulletToward(tx, ty);
  // Check direct tap on enemy for bonus damage
  let hit=null, minDist=70;
  for(const en of enemies){
    if(!en.alive) continue;
    const d=Math.hypot(en.x-tx,en.y-ty);
    if(d<en.size+28&&d<minDist){minDist=d;hit=en;}
  }
  if(hit) damageEnemy(hit,1,tx,ty);
}

// NOVA: expend all remaining energy in one burst
function powerShot(){
  if(!gameActive||energy<30) return;
  const shots=Math.floor(energy/8);
  for(let i=0;i<shots;i++){
    const ang=(i/shots)*Math.PI*2;
    const tx=px()+Math.cos(ang)*300, ty=py()+Math.sin(ang)*300;
    setTimeout(()=>fireBulletToward(tx,ty), i*40);
  }
  spawnExplosion(px(),py(),'#00ffff',20,6);
  spawnExplosion(px(),py(),'#ff00ff',20,5);
  energy=0; updateEnergyBar();
  if(navigator.vibrate) navigator.vibrate([80,30,80,30,150]);
}

function fireBulletToward(tx,ty){
  const ox=px(), oy=py();
  const ang=Math.atan2(ty-oy,tx-ox);
  const spd=22+Math.random()*3;
  bullets.push({x:ox,y:oy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1.0,trail:[]});
  // Muzzle flash — smaller when energy is low
  const flashCount = Math.max(2, Math.round((energy/ENERGY_MAX)*6));
  spawnExplosion(ox,oy,'#ff00ff',flashCount,2.5);
}

function damageEnemy(en,dmg,hx,hy){
  en.hp-=dmg; en.hitFlash=1.0;
  if(en.hp<=0) killEnemy(en,hx,hy);
}

function killEnemy(en,hx,hy){
  en.alive=false;
  combo++; clearTimeout(comboTimer);
  comboTimer=setTimeout(()=>{combo=0;},2200);
  const pts=en.pts*(combo>1?combo:1);
  score+=pts;
  if(score>bestScore){bestScore=score;localStorage.setItem('neonrift_best',bestScore);}
  updateHUD();
  spawnExplosion(en.x,en.y,en.color,20,5);
  spawnExplosion(en.x,en.y,'#ffffff',6,2);
  floaters.push({x:en.x,y:en.y,text:'+'+(combo>1?combo+'x ':'')+pts,life:1.0,color:en.color});
  if(combo>1) showCombo(combo,pts);

  const alive=enemies.filter(e=>e.alive);
  if(alive.length===0&&!waveAdvancing){
    waveAdvancing=true;
    setTimeout(()=>{
      if(!gameActive) return;
      wave++; showWaveBanner(wave);
      energy=ENERGY_MAX; updateEnergyBar();  // full charge between waves
      health=Math.min(100,health+15);
      enemies.length=0;
      setTimeout(()=>{ spawnWave(wave); waveAdvancing=false; },2600);
    },1400);
  }
}

function showCombo(c,pts){
  const el=document.getElementById('combo-flash');
  el.textContent=c+'x COMBO! +'+pts; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),900);
}

// No discrete reload — energy recharges automatically in game loop

// ── HUD ────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-wave').textContent=wave;
  document.getElementById('hud-best').textContent=bestScore;
  const pct=Math.max(0,health);
  document.getElementById('health-bar-fill').style.width=pct+'%';
  document.getElementById('health-bar-fill').classList.toggle('danger',pct<30);
}

function endGame(){
  gameActive=false;
  document.getElementById('go-score-val').textContent=score;
  document.getElementById('go-best-val').textContent=bestScore;
  document.getElementById('game-over').classList.add('show');
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
}

function showWaveBanner(w){
  const el=document.getElementById('wave-banner');
  document.getElementById('wave-title').textContent='WAVE '+w;
  document.getElementById('wave-sub').textContent=
    w===1?'TAP ENEMIES TO SHOOT — SURVIVE THE WAVE':
    w%5===0?'⚠ BOSS WAVE — HIGH THREAT':
    ['MULTIPLE CONTACTS','FLANKING DETECTED','ALL SIDES HOT','HOLD THE LINE'][w%4];
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

function spawnExplosion(x,y,color,count,maxSpd){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2, spd=(0.3+Math.random())*maxSpd;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      life:1.0,decay:0.022+Math.random()*0.028,size:1+Math.random()*3.5,color});
  }
}

// ── Motion detection ──────────────────────────────────────
function processMotion(now){
  if(now-lastProc<PROC_MS) return;
  if(video.readyState<2||!proc.width) return;
  lastProc=now;
  pctx.drawImage(video,0,0,proc.width,proc.height);
  const cur=pctx.getImageData(0,0,proc.width,proc.height);
  if(warmup<5){prevFrame=cur;warmup++;return;}
  if(!prevFrame){prevFrame=cur;return;}
  const cd=cur.data,pd=prevFrame.data;
  let changed=0,total=proc.width*proc.height;
  let minX=proc.width,maxX=0,minY=proc.height,maxY=0;
  for(let i=0;i<cd.length;i+=4){
    const d=(Math.abs(cd[i]-pd[i])+Math.abs(cd[i+1]-pd[i+1])+Math.abs(cd[i+2]-pd[i+2]))/3;
    if(d>26){
      changed++;
      const qx=(i/4)%proc.width, qy=Math.floor((i/4)/proc.width);
      if(qx<minX)minX=qx;if(qx>maxX)maxX=qx;
      if(qy<minY)minY=qy;if(qy>maxY)maxY=qy;
    }
  }
  const pct=(changed/total)*100;
  if(pct>2.0&&maxX>minX&&maxY>minY){
    motionZones.push({x:minX,y:minY,w:maxX-minX,h:maxY-minY,age:0,pct});
    if(motionZones.length>6) motionZones.shift();
    // Scan ring on main canvas at motion location
    const scX=(minX+(maxX-minX)/2)*(gc.width/proc.width);
    const scY=(minY+(maxY-minY)/2)*(gc.height/proc.height);
    const rMax=Math.max(maxX-minX,maxY-minY)*(gc.width/proc.width)*0.5+60;
    scanRings.push({x:scX,y:scY,r:10,maxR:rMax,life:1.0,color:pct>5?'#ff2244':'#00ffff'});
  }
  for(const z of motionZones) z.age+=PROC_MS;
  prevFrame=cur;
}

// ── Draw ───────────────────────────────────────────────────
function drawEnemy(en){
  if(!en.alive) return;
  const {x,y,size,color,shape,rot,hp,maxHp,hitFlash,age}=en;
  const alpha=Math.min(1,en.spawnFlash);
  ctx.save();
  ctx.translate(x,y); ctx.rotate(rot);
  ctx.globalAlpha=alpha;
  ctx.shadowColor=color; ctx.shadowBlur=16+Math.sin(age*0.05)*5;
  ctx.strokeStyle=hitFlash>0?`rgba(255,255,255,${hitFlash})`:color;
  ctx.lineWidth=2;
  ctx.beginPath();
  if(shape==='diamond'){
    ctx.moveTo(0,-size);ctx.lineTo(size*.6,0);ctx.lineTo(0,size);ctx.lineTo(-size*.6,0);ctx.closePath();
  }else if(shape==='hex'){
    for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i===0?ctx.moveTo(Math.cos(a)*size,Math.sin(a)*size):ctx.lineTo(Math.cos(a)*size,Math.sin(a)*size);}ctx.closePath();
  }else if(shape==='square'){
    ctx.rect(-size/2,-size/2,size,size);
  }else if(shape==='tri'){
    ctx.moveTo(0,-size);ctx.lineTo(size*.87,size*.5);ctx.lineTo(-size*.87,size*.5);ctx.closePath();
  }else if(shape==='star'){
    for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2,r=i%2===0?size:size*.45;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();
  }
  ctx.stroke();
  ctx.globalAlpha=alpha*0.1; ctx.fillStyle=color; ctx.fill();
  if(hp<maxHp){
    ctx.globalAlpha=alpha;
    const bw=size*1.4,bh=3,bx=-bw/2,by=size+5;
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=hp/maxHp>.5?color:'#ff2244'; ctx.fillRect(bx,by,bw*(hp/maxHp),bh);
  }
  ctx.globalAlpha=alpha*.5;
  ctx.font="7px 'Share Tech Mono'"; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillStyle=color; ctx.shadowBlur=4; ctx.shadowColor=color;
  ctx.fillText(en.name,0,-size-3);
  ctx.restore();
}

function drawBullet(b){
  for(let i=0;i<b.trail.length;i++){
    const t=b.trail[i],a=(i/b.trail.length)*.45*b.life;
    ctx.beginPath(); ctx.arc(t.x,t.y,2*(i/b.trail.length),0,Math.PI*2);
    ctx.fillStyle=`rgba(255,0,255,${a})`; ctx.fill();
  }
  ctx.save();
  ctx.shadowColor='#ff00ff'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,255,${b.life})`; ctx.fill();
  ctx.restore();
}

// ── Crosshair — always at screen centre ───────────────────
function drawCrosshair(){
  const cx=px(), cy=py();
  // Outer rotating ring
  const t=Date.now()*0.001;
  ctx.save();
  ctx.translate(cx,cy); ctx.rotate(t*.4);
  ctx.strokeStyle='rgba(0,255,255,0.25)';
  ctx.lineWidth=1; ctx.shadowColor='#00ffff'; ctx.shadowBlur=6;
  ctx.setLineDash([6,8]);
  ctx.beginPath(); ctx.arc(0,0,32,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Static inner crosshair
  ctx.save();
  ctx.translate(cx,cy);
  ctx.strokeStyle='rgba(0,255,255,0.75)';
  ctx.lineWidth=1.5; ctx.shadowColor='#00ffff'; ctx.shadowBlur=10;
  const r=18,gap=7,len=14;
  [[0,-(r+gap),0,-(r+gap+len)],[0,r+gap,0,r+gap+len],[-(r+gap),0,-(r+gap+len),0],[r+gap,0,r+gap+len,0]]
    .forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  // Centre pip
  ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2);
  ctx.fillStyle='rgba(0,255,255,0.9)'; ctx.fill();

  // Lock-on bracket if enemy is close
  const nearest=getNearestEnemy();
  if(nearest){
    const dist=Math.hypot(nearest.x-cx,nearest.y-cy);
    if(dist<200){
      const opacity=Math.max(0,1-(dist/200));
      ctx.rotate(Math.atan2(nearest.y-cy,nearest.x-cx));
      ctx.strokeStyle=`rgba(255,0,68,${opacity*.8})`;
      ctx.lineWidth=1.5; ctx.shadowColor='#ff2244'; ctx.shadowBlur=10;
      const ar=24;
      ctx.beginPath(); ctx.moveTo(ar,0); ctx.lineTo(ar-8,-6); ctx.lineTo(ar-8,6); ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── Radar minimap ──────────────────────────────────────────
function drawRadar(){
  const size = radarOpen ? 200 : 80;  // big when open, mini otherwise
  const margin=14;
  const rx=gc.width-margin-size, ry=gc.height-margin-size-70; // above bottom bar

  ctx.save();
  // Background
  ctx.globalAlpha=radarOpen?.88:.65;
  ctx.fillStyle='rgba(0,3,8,0.9)';
  ctx.beginPath(); ctx.arc(rx+size/2,ry+size/2,size/2,0,Math.PI*2); ctx.fill();
  // Border
  ctx.globalAlpha=radarOpen?1:.6;
  ctx.strokeStyle=radarOpen?'#00ffff':'rgba(0,255,255,0.4)';
  ctx.lineWidth=1; ctx.shadowColor='#00ffff'; ctx.shadowBlur=radarOpen?10:4;
  ctx.beginPath(); ctx.arc(rx+size/2,ry+size/2,size/2,0,Math.PI*2); ctx.stroke();
  // Sweep line
  const sweep=(Date.now()*0.0015)%(Math.PI*2);
  ctx.globalAlpha=.25;
  const grad=ctx.createConicalGradient
    ? null : null; // no native conical, draw a wedge instead
  ctx.strokeStyle='#00ffff'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(rx+size/2,ry+size/2);
  ctx.lineTo(rx+size/2+Math.cos(sweep)*size/2, ry+size/2+Math.sin(sweep)*size/2);
  ctx.stroke();
  // Sweep trail (fade arc)
  for(let i=1;i<=6;i++){
    ctx.globalAlpha=0.04*(7-i);
    ctx.beginPath();
    ctx.moveTo(rx+size/2,ry+size/2);
    ctx.arc(rx+size/2,ry+size/2,size/2,sweep-i*0.18,sweep-(i-1)*0.18);
    ctx.lineTo(rx+size/2,ry+size/2);
    ctx.fillStyle='#00ffff'; ctx.fill();
  }
  // Grid rings
  ctx.globalAlpha=.12; ctx.strokeStyle='#00ffff'; ctx.lineWidth=.5; ctx.shadowBlur=0;
  [.33,.66,1].forEach(r=>{
    ctx.beginPath(); ctx.arc(rx+size/2,ry+size/2,r*size/2,0,Math.PI*2); ctx.stroke();
  });
  // Cross
  ctx.globalAlpha=.1;
  ctx.beginPath(); ctx.moveTo(rx,ry+size/2); ctx.lineTo(rx+size,ry+size/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx+size/2,ry); ctx.lineTo(rx+size/2,ry+size); ctx.stroke();

  // Enemy blips
  ctx.globalAlpha=1;
  const cx=px(), cy=py();
  const scale=(size/2)/Math.max(gc.width,gc.height)*0.9;
  for(const en of enemies){
    if(!en.alive) continue;
    const ex=en.x-cx, ey=en.y-cy;
    const bx=rx+size/2+ex*scale, by=ry+size/2+ey*scale;
    // Clip to radar circle
    if(Math.hypot(bx-(rx+size/2),by-(ry+size/2))>size/2-4) continue;
    const pulse=.5+Math.sin(Date.now()*0.006+en.bobPhase)*.5;
    ctx.beginPath(); ctx.arc(bx,by,radarOpen?3.5:2.5,0,Math.PI*2);
    ctx.fillStyle=en.color;
    ctx.shadowColor=en.color; ctx.shadowBlur=8*pulse;
    ctx.globalAlpha=.7+pulse*.3;
    ctx.fill();
  }

  // Player dot (centre)
  ctx.globalAlpha=1;
  ctx.beginPath(); ctx.arc(rx+size/2,ry+size/2,radarOpen?4:3,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.shadowColor='#ffffff'; ctx.shadowBlur=10;
  ctx.fill();

  // Label
  if(radarOpen){
    ctx.globalAlpha=.6;
    ctx.font="8px 'Share Tech Mono'"; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillStyle='#00ffff'; ctx.shadowBlur=0;
    ctx.fillText('RADAR — '+enemies.filter(e=>e.alive).length+' CONTACTS',rx+size/2,ry+size+4);
  }
  ctx.restore();
}

function drawScanRing(r){
  ctx.save();
  ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
  ctx.strokeStyle=r.color; ctx.lineWidth=1.5;
  ctx.globalAlpha=r.life*.6; ctx.shadowColor=r.color; ctx.shadowBlur=10;
  ctx.stroke(); ctx.restore();
}

function drawFloater(f){
  ctx.save();
  ctx.font="bold 14px 'Orbitron'"; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=f.color; ctx.globalAlpha=f.life;
  ctx.shadowColor=f.color; ctx.shadowBlur=10;
  ctx.fillText(f.text,f.x,f.y); ctx.restore();
}

// ── Game loop ──────────────────────────────────────────────
let lastFrame=0;
function gameLoop(now){
  requestAnimationFrame(gameLoop);
  const dt=Math.min((now-lastFrame)/16.67,3);
  lastFrame=now;

  processMotion(now);
  ctx.clearRect(0,0,gc.width,gc.height);
  if(!gameActive){ drawRadar(); return; }

  // ── Energy weapon tick ─────────────────────────────────────
  if(fireHeld && isFiring){
    // Drain energy while held
    energy=Math.max(0, energy-ENERGY_DRAIN*dt);
    if(energy<ENERGY_MIN_FIRE){
      isFiring=false; // weapon overheated — must release to recharge
    } else {
      // Auto-fire at held aim target on FIRE_RATE interval
      if(now-lastShotTime>=FIRE_RATE){
        lastShotTime=now;
        const tx=tapLayer._aimX||px();
        const ty=tapLayer._aimY||py()-100;
        fireBulletToward(tx, ty);
        // Hit detection for continuous fire
        let hit=null,minD=70;
        for(const en of enemies){
          if(!en.alive) continue;
          const d=Math.hypot(en.x-tx,en.y-ty);
          if(d<en.size+28&&d<minD){minD=d;hit=en;}
        }
        if(hit) damageEnemy(hit,1,tx,ty);
      }
    }
  } else {
    // Recharge while not firing — gradual and satisfying
    if(energy<ENERGY_MAX){
      energy=Math.min(ENERGY_MAX, energy+ENERGY_RECHARGE*dt);
      if(!fireHeld && energy>=ENERGY_MIN_FIRE) isFiring=false;
    }
  }
  updateEnergyBar();

  // ── Shield recharge — kicks in after SHIELD_DELAY ms of no damage ──
  if(health>0 && health<100 && (now-lastDamageTime)>SHIELD_DELAY){
    health=Math.min(100, health+SHIELD_RECHARGE*dt);
    updateHUD();
  }

  // Update enemies
  for(const en of enemies){
    if(!en.alive) continue;
    en.age++; en.rot+=en.rotSpd;
    en.spawnFlash=Math.min(1,en.spawnFlash+0.05);
    en.hitFlash=Math.max(0,en.hitFlash-.09);
    en.y+=Math.sin(en.bobPhase+en.age*.025)*.25;
    en.x+=en.vx*dt; en.y+=en.vy*dt;
    // Steer toward player (centre)
    const dx=px()-en.x, dy=py()-en.y, dist=Math.hypot(dx,dy);
    if(dist>1){ en.vx+=dx/dist*.016*dt; en.vy+=dy/dist*.016*dt; }
    const maxSpd=3.5+wave*.15;
    const spd=Math.hypot(en.vx,en.vy);
    if(spd>maxSpd){ en.vx=en.vx/spd*maxSpd; en.vy=en.vy/spd*maxSpd; }
    // Contact with player at centre
    if(dist<46){
      health-=en.dmg; lastDamageTime=now; updateHUD();
      spawnExplosion(en.x,en.y,'#ff2244',14,5);
      if(navigator.vibrate) navigator.vibrate([60,30,120]);
      const wasDead=health<=0;
      killEnemy(en,en.x,en.y);
      if(wasDead){ endGame(); return; }
    }
  }

  // Update bullets
  for(const b of bullets){
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>12) b.trail.shift();
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    b.life-=.02*dt;
    for(const en of enemies){
      if(!en.alive||b.life<=0) continue; // energy weapon — no reload gate
      if(Math.hypot(en.x-b.x,en.y-b.y)<en.size+4){
        damageEnemy(en,1,b.x,b.y); b.life=0;
        spawnExplosion(b.x,b.y,en.color,7,3); break;
      }
    }
  }
  for(let i=bullets.length-1;i>=0;i--) if(bullets[i].life<=0) bullets.splice(i,1);

  // Particles
  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=.07*dt; p.life-=p.decay*dt; }
  for(let i=particles.length-1;i>=0;i--) if(particles[i].life<=0) particles.splice(i,1);

  // Scan rings
  for(const r of scanRings){ r.r=Math.min(r.r+(r.maxR-r.r)*.1*dt,r.maxR); r.life-=.016*dt; }
  for(let i=scanRings.length-1;i>=0;i--) if(scanRings[i].life<=0) scanRings.splice(i,1);

  // Floaters
  for(const f of floaters){ f.y-=.8*dt; f.life-=.022*dt; }
  for(let i=floaters.length-1;i>=0;i--) if(floaters[i].life<=0) floaters.splice(i,1);

  // DRAW
  for(const r of scanRings) drawScanRing(r);
  for(const p of particles){
    ctx.save(); ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.globalAlpha=p.life;
    ctx.shadowColor=p.color; ctx.shadowBlur=7;
    ctx.fill(); ctx.restore();
  }
  for(const b of bullets) drawBullet(b);
  for(const en of enemies) drawEnemy(en);
  for(const f of floaters) drawFloater(f);
  drawCrosshair();
  drawRadar();
}

requestAnimationFrame(gameLoop);
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
