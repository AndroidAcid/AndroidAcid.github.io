<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PHANTOM ATTACK-ish (VIC-20 style) — Fixed Screen Swoop Shooter</title>
<style>
  :root{
    --bg:#05040a;
    --fg:#cfe9ff;
    --c1:#28f7ff;
    --c2:#ff2df7;
    --c3:#b7ff3c;
    --c4:#ffd24a;
    --danger:#ff3b3b;
  }
  html,body{margin:0;height:100%;background:radial-gradient(900px 520px at 20% 15%, #141a48 0%, #070817 45%, #020207 100%); overflow:hidden; color:var(--fg); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;}
  canvas{display:block; width:100vw; height:100vh; image-rendering:pixelated;}
  .hud{
    position:fixed; left:12px; top:10px;
    background:rgba(0,0,0,.28); border:1px solid rgba(40,247,255,.22);
    border-radius:12px; padding:10px 12px; user-select:none;
    box-shadow:0 0 18px rgba(40,247,255,.12);
    max-width:min(560px, calc(100vw - 24px));
  }
  .hud b{color:var(--c1)}
  .hud .row{display:flex; gap:14px; flex-wrap:wrap; align-items:baseline}
  .hint{
    position:fixed; left:12px; bottom:10px; opacity:.9;
    background:rgba(0,0,0,.22); border:1px solid rgba(255,45,247,.18);
    border-radius:12px; padding:8px 10px; user-select:none;
    box-shadow:0 0 18px rgba(255,45,247,.10);
  }
  .hint kbd{
    padding:2px 6px; border-radius:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    font-weight:700;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hud" id="hud">
  <div class="row">
    <div><b>PHANTOM ATTACK-ish</b> — fixed-screen swoop shooter</div>
  </div>
  <div class="row" style="margin-top:6px">
    <div>Score: <span id="score">0</span></div>
    <div>Lives: <span id="lives">3</span></div>
    <div>Wave: <span id="level">1</span></div>
    <div>Chain: <span id="chain">x1</span></div>
    <div>Quota: <span id="quota">0/0</span></div>
  </div>
  <div class="row" style="margin-top:6px; opacity:.9">
    <div id="status">Press Enter to start.</div>
  </div>
</div>

<div class="hint">
  <div>Move <kbd>◀</kbd>/<kbd>▶</kbd>/<kbd>▲</kbd>/<kbd>▼</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> · Fire <kbd>Space</kbd> · Focus <kbd>Shift</kbd></div>
  <div>Start / Restart <kbd>Enter</kbd> · Pause <kbd>P</kbd></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  const hudScore = document.getElementById('score');
  const hudLives = document.getElementById('lives');
  const hudLevel = document.getElementById('level');   // shows Wave
  const hudChain = document.getElementById('chain');
  const hudQuota = document.getElementById('quota');
  const hudStatus = document.getElementById('status');

  const W0 = 320, H0 = 200;
  let W = W0, H = H0, scale = 1;

  function resize() {
    const ww = innerWidth, hh = innerHeight;
    scale = Math.floor(Math.min(ww / W0, hh / H0));
    scale = Math.max(1, Math.min(scale, 5));
    W = W0; H = H0;
    canvas.width = W; canvas.height = H;
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
    canvas.style.marginLeft = ((ww - W*scale)/2) + 'px';
    canvas.style.marginTop = ((hh - H*scale)/2) + 'px';
  }
  addEventListener('resize', resize);
  resize();

  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const rnd = (a,b)=>a + Math.random()*(b-a);
  const TAU = Math.PI*2;

  const keys = new Set();
  addEventListener('keydown', (e) => {
    if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," ","Shift","Enter","p","P","a","A","d","D","w","W","s","S"].includes(e.key)) e.preventDefault();
    keys.add(e.key);
    if(e.key === 'p' || e.key === 'P') togglePause();
    if(e.key === 'Enter') startOrRestart();
  });
  addEventListener('keyup', (e)=>keys.delete(e.key));

  let audioOK = false, AC=null, master=null;
  function beep(freq=440, dur=0.06, type='square', gain=0.05) {
    if(!audioOK) return;
    const t = AC.currentTime;
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t+0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+dur+0.02);
  }
  function ensureAudio() {
    if(audioOK) return;
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain();
      master.gain.value = 0.55;
      master.connect(AC.destination);
      audioOK = true;
    }catch(_){}
  }
  addEventListener('pointerdown', ensureAudio, { once:true });
  addEventListener('keydown', ensureAudio, { once:true });

  let running = false;
  let paused = false;
  let tNow = 0, tLast = 0;

  let levelUpPause = false;
  let levelUpTimer = 0;

  const stars = new Array(80).fill(0).map(()=>({
    x: Math.random()*W,
    y: Math.random()*H,
    z: rnd(0.3, 1.0),
    s: rnd(0.4, 1.4)
  }));

  const player = {
    x: W/2, y: H-18,
    vx: 0, vy: 0,
    w: 14, h: 8,
    lives: 3,
    inv: 0,
    fireCD: 0,
    focus: false
  };

  const PLAY_MIN_Y = 86;
  const PLAY_MAX_Y = H - 14;

  let score = 0;
  let wave = 1;              // (was "level")
  let chain = 1;
  let chainTimer = 0;

  // wave completion is kill-based
  let killsThisWave = 0;

  // NEW: wave quota increases every wave (more kills needed each wave)
  const WAVE_QUOTA_BASE = 10;     // starting kills required
  const WAVE_QUOTA_STEP = 5;      // +2 kills every wave (steady ramp)
  const WAVE_QUOTA_CAP  = 120;    // hard cap so it doesn't go infinite-forever painful
  function getWaveQuota(w){
    return clamp(WAVE_QUOTA_BASE + (w-1)*WAVE_QUOTA_STEP, WAVE_QUOTA_BASE, WAVE_QUOTA_CAP);
  }

  const bullets = [];
  const enemies = [];
  const sparks = [];

  let spawnTimer = 0;
  let stateMsg = "Press Enter to start.";
  let gameOver = false;

  // Enemy types:
  // 0 BASIC
  // 1 SPLITTER (2hp + splits)
  // 2 DRIFTER (zigzag specialist)   [ZIGZAG waves]
  // 3 HUNTER  (retargeting)         [HUNTER waves]
  // 4 CHARGER (rush dive)           [RUSH waves]

  function diffForWave(WV){
    const s = clamp(WV,1,200);

    // IMPORTANT: targetCount now follows the wave quota, so you always have enough enemies to kill
    const quota = getWaveQuota(WV);

    const base = {
      targetCount: quota,                                // <-- key link
      spawnEvery: clamp(0.55 - s*0.004, 0.12, 0.55),
      speed: 38 + s*1.15,
      sway: 20 + s*0.45,
      dive: 0.6 + s*0.012,
      fireCD: clamp(0.20 - s*0.0011, 0.11, 0.20)
    };

    const waveMode = (WV - 1) % 4; // 0..3
    let speedMul = 1.0;
    let swayMul = 1.0;
    let homingMul = 1.0;
    let formMul = 1.0;
    let splitterChance = 0.25;
    let retarget = 0;
    let newTypeChance = 0.0;

    if(waveMode === 1){
      // ZIGZAG
      swayMul = 1.55;
      homingMul = 0.85;
      splitterChance = 0.18;
      newTypeChance = 0.30;
    } else if(waveMode === 2){
      // HUNTER
      swayMul = 0.85;
      homingMul = 1.35;
      splitterChance = 0.32;
      retarget = clamp(0.55 - s*0.003, 0.18, 0.55);
      newTypeChance = 0.26;
    } else if(waveMode === 3){
      // RUSH
      speedMul = 1.35;
      formMul = 0.72;
      splitterChance = 0.14;
      base.spawnEvery = clamp(base.spawnEvery * 0.88, 0.10, 0.55);
      newTypeChance = 0.34;
    }

    return {
      ...base,
      waveMode,
      speedMul,
      swayMul,
      homingMul,
      formMul,
      splitterChance,
      retarget,
      newTypeChance
    };
  }

  function resetAll() {
    bullets.length = 0;
    enemies.length = 0;
    sparks.length = 0;

    score = 0;
    wave = 1;
    chain = 1;
    chainTimer = 0;

    killsThisWave = 0;

    player.x = W/2;
    player.y = H-18;
    player.vx = 0;
    player.vy = 0;
    player.lives = 3;
    player.inv = 1.2;
    player.fireCD = 0;

    spawnTimer = 0;

    gameOver = false;
    paused = false;
    levelUpPause = false;
    levelUpTimer = 0;

    stateMsg = "";
    step.totalSpawnedThisWave = 0;

    hudStatus.textContent = "Press Enter to start.";
  }

  function startOrRestart() {
    if(!running){
      resetAll();
      running = true;
      paused = false;
      stateMsg = "";
      hudStatus.textContent = stateMsg;
      beep(660,0.05,'square',0.06);
      return;
    }
    if(gameOver){
      resetAll();
      paused = false;
      stateMsg = "";
      hudStatus.textContent = stateMsg;
      beep(520,0.06,'square',0.06);
      return;
    }
  }

  function togglePause(){
    if(!running) return;
    paused = !paused;
    hudStatus.textContent = paused ? "Paused." : stateMsg;
    beep(paused?220:440, 0.05, 'square', 0.05);
  }

  function recycleEnemy(e){
    e.aggr = clamp((e.aggr || 1) + 0.35, 1, 3.6);

    e.t = 0;
    e.phase = rnd(0, TAU);
    e.dir = (Math.random()<0.5 ? -1 : 1);

    e.x = rnd(18, W-18);
    e.y = rnd(10, 26);
    e.x0 = e.x;
    e.y0 = e.y;

    const aimSpread = clamp(70 / e.aggr, 16, 70);
    e.targetX = clamp(player.x + rnd(-aimSpread, aimSpread), 20, W-20);

    e.retargetT = 0;
    e.chargeLock = false;
    e.chargeVX = 0;

    beep(240 + e.aggr*60, 0.03, 'square', 0.02);

    for(let i=0;i<6;i++){
      const a = rnd(-Math.PI*0.9, -Math.PI*0.1);
      const sp = rnd(20, 70);
      sparks.push({
        x: clamp(e.x, 10, W-10),
        y: H-12,
        vx: Math.cos(a)*sp,
        vy: Math.sin(a)*sp,
        life: rnd(0.18,0.35),
        t: 0,
        col: e.hue
      });
    }
  }

  function pickEnemyTypeForWave(d){
    if(d.waveMode === 1 && Math.random() < d.newTypeChance) return 2;
    if(d.waveMode === 2 && Math.random() < d.newTypeChance) return 3;
    if(d.waveMode === 3 && Math.random() < d.newTypeChance) return 4;
    return (Math.random() < d.splitterChance) ? 1 : 0;
  }

  function spawnEnemy() {
    const d = diffForWave(wave);
    const type = pickEnemyTypeForWave(d);

    const x = rnd(18, W-18);
    const y = rnd(10, 26);
    const phase = rnd(0, TAU);
    const dir = Math.random()<0.5 ? -1 : 1;

    const hp =
      (type===1) ? 2 :
      (type===3) ? 2 :
      1;

    enemies.push({
      x, y,
      x0: x, y0: y,
      t: 0,
      hp,
      type,
      dir,
      phase,
      targetX: clamp(player.x + rnd(-70,70), 20, W-20),
      hue: (type===4) ? 'c4' : (Math.random()<0.5 ? 'c1' : (Math.random()<0.5 ? 'c2' : 'c3')),
      alive: true,
      aggr: 1,
      waveMode: d.waveMode,
      retargetT: 0,

      driftT: 0,
      driftFlipT: rnd(0.25, 0.65),
      driftDir: dir,

      chargeLock: false,
      chargeVX: 0,
      chargeBoost: 0
    });
  }

  function killEnemy(e, byBullet=true) {
    e.alive = false;

    // kill-based progression
    killsThisWave++;

    const base =
      (e.type===1) ? 90 :
      (e.type===3) ? 110 :
      (e.type===4) ? 100 :
      60;

    score += base * chain;

    chainTimer = 1.1;
    chain = clamp(chain + 1, 1, 12);

    const n = (e.type===1 || e.type===3 || e.type===4) ? 18 : 12;
    for(let i=0;i<n;i++){
      const a = rnd(0,TAU);
      const sp = rnd(18, 80);
      sparks.push({
        x:e.x, y:e.y,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
        life:rnd(0.25,0.6),
        t:0,
        col:e.hue
      });
    }
    beep(820 + chain*18, 0.03, 'square', 0.04);

    if(e.type===1 && byBullet && Math.random()<0.75){
      for(let k=0;k<2;k++){
        enemies.push({
          x:e.x + (k?6:-6), y:e.y,
          x0:e.x, y0:e.y,
          t:0,
          hp:1,
          type:0,
          dir:(k?1:-1),
          phase:rnd(0,TAU),
          targetX: clamp(e.targetX + (k?24:-24), 20, W-20),
          hue: (k? 'c2':'c3'),
          alive:true,
          aggr: Math.max(1, (e.aggr||1) * 0.9),
          waveMode: e.waveMode || 0,
          retargetT: 0,

          driftT: 0,
          driftFlipT: rnd(0.25, 0.65),
          driftDir: (k?1:-1),
          chargeLock: false,
          chargeVX: 0,
          chargeBoost: 0
        });
      }
    }
  }

  function hitPlayer() {
    if(player.inv>0) return;
    player.lives--;
    player.inv = 1.35;
    chain = 1; chainTimer = 0;

    for(let i=0;i<20;i++){
      const a = rnd(0,TAU);
      const sp = rnd(25, 95);
      sparks.push({
        x:player.x, y:player.y,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
        life:rnd(0.35,0.85),
        t:0,
        col:'danger'
      });
    }
    beep(140, 0.12, 'sawtooth', 0.05);
    beep(90, 0.18, 'square', 0.03);

    if(player.lives <= 0){
      gameOver = true;
      hudStatus.textContent = "Game Over. Press Enter.";
      for(let i=0;i<70;i++){
        const a = rnd(0,TAU);
        const sp = rnd(40, 160);
        sparks.push({
          x:player.x, y:player.y,
          vx:Math.cos(a)*sp,
          vy:Math.sin(a)*sp,
          life:rnd(0.6,1.4),
          t:0,
          col:(i%3===0?'c1':(i%3===1?'c2':'c3'))
        });
      }
    } else {
      hudStatus.textContent = ""; // no narration spam
    }
  }

  function fire() {
    const d = diffForWave(wave);
    if(player.fireCD > 0) return;

    const c = clamp(chain, 1, 12);
    const chainStep = (c - 1);

    const bulletSpeed = 180 * (1 + 0.03 * chainStep);
    const cdBoost = 1 / (1 + 0.06 * chainStep);
    const cd = clamp(d.fireCD * cdBoost, 0.07, d.fireCD);

    player.fireCD = cd;

    bullets.push({
      x: player.x,
      y: player.y - 7,
      vy: -bulletSpeed,
      life: 1.1
    });

    beep(520 + chain*10, 0.025, 'square', 0.035);
  }

  function aabb(ax,ay,aw,ah, bx,by,bw,bh){
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }

  function step(dt){
    for(const s of stars){
      s.y += (12 + 38*s.z) * dt;
      s.x += Math.sin((tNow*0.6)+(s.z*3))* (2.5*s.z) * dt;
      if(s.y > H+2){ s.y = -2; s.x = Math.random()*W; }
      if(s.x < -4) s.x = W+4;
      if(s.x > W+4) s.x = -4;
    }

    if(!running || paused || gameOver) return;

    const d = diffForWave(wave);

    if(chainTimer>0){
      chainTimer -= dt;
      if(chainTimer<=0) chain = 1;
    }

    player.focus = keys.has('Shift');
    const accel = player.focus ? 720 : 1080;
    const vmax  = player.focus ? 112 : 185;
    const fric  = player.focus ? 12 : 13;

    let ax = 0, ay = 0;
    if(keys.has('ArrowLeft') || keys.has('a') || keys.has('A')) ax -= 1;
    if(keys.has('ArrowRight') || keys.has('d') || keys.has('D')) ax += 1;
    if(keys.has('ArrowUp') || keys.has('w') || keys.has('W')) ay -= 1;
    if(keys.has('ArrowDown') || keys.has('s') || keys.has('S')) ay += 1;

    if(ax !== 0 && ay !== 0){
      const inv = 1/Math.sqrt(2);
      ax *= inv; ay *= inv;
    }

    player.vx += ax * accel * dt;
    player.vy += ay * accel * dt;

    player.vx *= Math.exp(-fric * dt);
    player.vy *= Math.exp(-fric * dt);

    player.vx = clamp(player.vx, -vmax, vmax);
    player.vy = clamp(player.vy, -vmax, vmax);

    player.x += player.vx * dt;
    player.y += player.vy * dt;

    player.x = clamp(player.x, 14, W-14);
    player.y = clamp(player.y, PLAY_MIN_Y, PLAY_MAX_Y);

    player.fireCD = Math.max(0, player.fireCD - dt);
    if(keys.has(' ')) fire();

    player.inv = Math.max(0, player.inv - dt);

    spawnTimer -= dt;

    // Keep the number of active enemies reasonable; wave quota controls how many you must kill overall.
    const living = enemies.filter(e=>e.alive).length;
    const activeCap = clamp(10 + Math.floor(wave*0.6), 10, 28); // on-screen pressure cap
    if(living < activeCap){
      if(spawnTimer <= 0){
        spawnTimer = d.spawnEvery * rnd(0.85, 1.15);
        spawnEnemy();
        step.totalSpawnedThisWave = (step.totalSpawnedThisWave||0) + 1;
      }
    }

    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.y += b.vy * dt;
      b.life -= dt;
      if(b.y < -10 || b.life <= 0) bullets.splice(i,1);
    }

    for(let i=enemies.length-1;i>=0;i--){
      const e = enemies[i];
      if(!e.alive){ enemies.splice(i,1); continue; }

      e.t += dt;

      const dd = diffForWave(wave);
      const ag = e.aggr || 1;

      const wm = (e.waveMode ?? dd.waveMode) | 0;
      const speedMul = dd.speedMul;
      const swayMul  = dd.swayMul;
      const homMul   = dd.homingMul;
      const formMul  = dd.formMul;

      const hunterType = (e.type === 3);
      if((wm === 2 || hunterType) && dd.retarget > 0){
        const rt = hunterType ? Math.max(0.14, dd.retarget * 0.65) : dd.retarget;
        e.retargetT = (e.retargetT || 0) + dt;
        if(e.retargetT >= rt){
          e.retargetT = 0;
          const aimSpread = clamp((hunterType ? 34 : 52) / clamp(ag,1,3.6), 8, (hunterType?34:52));
          e.targetX = clamp(player.x + rnd(-aimSpread, aimSpread), 20, W-20);
        }
      }

      if(e.type === 2){
        e.driftT += dt;
        if(e.driftT >= e.driftFlipT){
          e.driftT = 0;
          e.driftFlipT = rnd(0.22, 0.62);
          e.driftDir *= -1;
          e.targetX = clamp(e.targetX + rnd(-50,50), 20, W-20);
        }
      }

      if(e.type === 4){
        e.chargeBoost = clamp((e.chargeBoost||0) + dt*(0.9 + ag*0.25), 0, 2.2);
      }

      const baseForm = 0.35 * formMul * (e.type===4 ? 0.72 : 1.0);
      const formTime = baseForm / clamp(ag, 1, 2.5);

      if(e.t < formTime){
        e.x = e.x0 + Math.sin(e.phase + e.t*8)*2.5;
        e.y = e.y0 + Math.sin(e.phase*1.3 + e.t*10)*1.8;
        if(e.type===4 && e.t > formTime*0.55){
          e.targetX = clamp(player.x + rnd(-22,22), 20, W-20);
        }
      } else {
        const tt = (e.t - formTime);

        let vy = dd.speed * (1 + dd.dive*0.35*tt);
        vy *= (0.95 + ag*0.35);
        vy *= speedMul;

        if(e.type === 2){ vy *= 0.92; }
        else if(e.type === 3){ vy *= 1.06; }
        else if(e.type === 4){ vy *= (1.20 + 0.35*clamp(e.chargeBoost||0, 0, 2.2)); }

        e.y += vy * dt;

        const to = (e.targetX - e.x);

        let homing = 0.85 * clamp(ag, 1, 3.6) * homMul;
        if(e.type === 2){ homing *= 0.65; }
        else if(e.type === 3){ homing *= 1.35; }
        else if(e.type === 4){
          if(!e.chargeLock){
            e.chargeLock = true;
            const dx = clamp(player.x - e.x, -140, 140);
            e.chargeVX = dx * (1.9 + 0.35*ag);
          }
          homing *= 0.55;
        }

        e.x += to * (homing * dt);

        let swayDampen = 1 / Math.sqrt(clamp(ag, 1, 3.6));
        let swayFactor = swayMul;
        if(e.type === 2){ swayFactor *= 1.35; }
        else if(e.type === 3){ swayFactor *= 0.70; }
        else if(e.type === 4){ swayFactor *= 0.45; }

        const sway = Math.sin(e.phase + tt* (3.2 + wave*0.02)) * (dd.sway * 0.012) * e.dir * swayDampen * swayFactor;
        e.x += sway * (60*dt);

        if(e.type === 2){
          const driftPush = Math.sin(e.phase*1.7 + tt*5.0) * (28 * swayDampen) * e.driftDir;
          e.x += driftPush * dt;
        }

        if(e.type === 4 && e.chargeLock){
          e.x += (e.chargeVX || 0) * dt;
          e.chargeVX *= Math.exp(-1.8 * dt);
        }

        if(e.x < 14){ e.x = 14; e.dir *= -1; e.driftDir *= -1; }
        if(e.x > W-14){ e.x = W-14; e.dir *= -1; e.driftDir *= -1; }
      }

      if(e.y > H-18){
        recycleEnemy(e);
        continue;
      }

      if(aabb(e.x-6, e.y-5, 12, 10, player.x-7, player.y-5, 14, 10)){
        e.alive = false;
        hitPlayer();
        continue;
      }
    }

    for(let bi=bullets.length-1; bi>=0; bi--){
      const b = bullets[bi];
      let hit = false;
      for(let ei=enemies.length-1; ei>=0; ei--){
        const e = enemies[ei];
        if(!e.alive) continue;
        if(aabb(b.x-1, b.y-2, 2, 4, e.x-7, e.y-6, 14, 12)){
          e.hp -= 1;
          hit = true;

          for(let k=0;k<6;k++){
            const a = rnd(0,TAU);
            const sp = rnd(10, 55);
            sparks.push({
              x:e.x, y:e.y,
              vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
              life:rnd(0.18,0.35),
              t:0,
              col:e.hue
            });
          }
          beep(920, 0.02, 'square', 0.03);

          if(e.hp <= 0) killEnemy(e, true);
          break;
        }
      }
      if(hit) bullets.splice(bi,1);
    }

    for(let i=sparks.length-1;i>=0;i--){
      const p = sparks[i];
      p.t += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= Math.pow(0.20, dt);
      p.vy *= Math.pow(0.20, dt);
      p.life -= dt;
      if(p.life <= 0) sparks.splice(i,1);
    }
  }

  function tryAdvanceWave(){
    const quota = getWaveQuota(wave);

    if(killsThisWave >= quota){
      wave++;
      killsThisWave = 0;
      step.totalSpawnedThisWave = 0;

      // clean slate between waves
      enemies.length = 0;
      bullets.length = 0;

      spawnTimer = 0.45;

      score += 250 + wave*10;
      chain = 1; chainTimer = 0;

      // pause with LEVEL UP only (no per-wave narration)
      levelUpPause = true;
      levelUpTimer = 1.05;
      paused = true;

      hudStatus.textContent = "LEVEL UP !";

      for(let i=0;i<36;i++){
        const a = (i/36)*TAU;
        const sp = rnd(30, 120);
        sparks.push({
          x: W/2, y: H/2,
          vx: Math.cos(a)*sp,
          vy: Math.sin(a)*sp,
          life: rnd(0.25,0.8),
          t:0,
          col: (i%3===0?'c1':(i%3===1?'c2':'c3'))
        });
      }
      beep(660,0.05,'square',0.06);
      beep(880,0.05,'square',0.05);

      player.inv = Math.max(player.inv, 0.65);
    }
  }

  function draw(){
    ctx.fillStyle = '#05040a';
    ctx.fillRect(0,0,W,H);

    for(const s of stars){
      const b = Math.floor(120 + 120*s.z);
      ctx.fillStyle = `rgb(${b},${b},${b})`;
      ctx.fillRect((s.x|0), (s.y|0), s.s<1?1:2, 1);
    }

    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#000';
    for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);
    ctx.globalAlpha = 1;

    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#28f7ff';
    ctx.fillRect(0, 0, W, 2);
    ctx.fillRect(0, 3, W, 1);
    ctx.globalAlpha = 1;

    for(const e of enemies){
      if(!e.alive) continue;

      const col =
        (e.hue==='c1') ? '#28f7ff' :
        (e.hue==='c2') ? '#ff2df7' :
        (e.hue==='c3') ? '#b7ff3c' :
        (e.hue==='c4') ? '#ffd24a' :
        '#28f7ff';

      ctx.globalAlpha = 0.25;
      ctx.fillStyle = col;
      ctx.fillRect((e.x-9)|0, (e.y-7)|0, 18, 14);
      ctx.globalAlpha = 1;

      ctx.fillStyle = col;
      const x = (e.x|0), y=(e.y|0);

      ctx.fillRect(x-6,y-5,12,10);
      ctx.clearRect(x-5,y-4,10,8);

      ctx.fillRect(x-4,y-2,3,2);
      ctx.fillRect(x+1,y-2,3,2);

      if(e.type===1){
        ctx.fillRect(x-3,y+1,6,1);
        ctx.fillRect(x-2,y+2,1,2);
        ctx.fillRect(x+1,y+2,1,2);
      } else if(e.type===2){
        ctx.fillRect(x-3,y+2,6,1);
        ctx.fillRect(x-4,y+1,1,1);
        ctx.fillRect(x+3,y+1,1,1);
      } else if(e.type===3){
        ctx.fillRect(x-3,y+1,6,1);
        ctx.fillRect(x-3,y+2,1,2);
        ctx.fillRect(x+2,y+2,1,2);
      } else if(e.type===4){
        ctx.fillRect(x-2,y+1,4,1);
        ctx.fillRect(x-1,y+2,2,2);
      } else {
        ctx.fillRect(x-2,y+2,4,1);
      }

      ctx.fillRect(x-8,y-2,2,4);
      ctx.fillRect(x+6,y-2,2,4);

      if(e.type===1 && e.hp>1){
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#ffd24a';
        ctx.fillRect(x-1,y-7,2,1);
        ctx.globalAlpha = 1;
      }
      if(e.type===2){
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#28f7ff';
        ctx.fillRect(x-5,y-7,2,1);
        ctx.fillRect(x+3,y-7,2,1);
        ctx.globalAlpha = 1;
      }
      if(e.type===3){
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#ff2df7';
        ctx.fillRect(x-1,y-7,2,1);
        ctx.fillRect(x-1,y-8,2,1);
        ctx.globalAlpha = 1;
      }
      if(e.type===4){
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#ffd24a';
        ctx.fillRect(x-6,y-6,1,1);
        ctx.fillRect(x+5,y-6,1,1);
        ctx.globalAlpha = 1;
      }
    }

    for(const b of bullets){
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#b7ff3c';
      ctx.fillRect((b.x-2)|0, (b.y-6)|0, 4, 10);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#eaffb8';
      ctx.fillRect((b.x-1)|0, (b.y-5)|0, 2, 8);
    }

    {
      const px = player.x|0, py = player.y|0;
      const inv = player.inv>0;
      if(inv && ((tNow*20)|0)%2===0){
      } else {
        ctx.globalAlpha = 0.28;
        ctx.fillStyle = '#28f7ff';
        ctx.fillRect(px-10, py-7, 20, 14);
        ctx.globalAlpha = 1;

        ctx.fillStyle = '#28f7ff';
        ctx.fillRect(px-7, py-4, 14, 8);
        ctx.clearRect(px-6, py-3, 12, 6);

        ctx.fillStyle = '#ff2df7';
        ctx.fillRect(px-2, py-2, 4, 2);

        ctx.fillStyle = '#b7ff3c';
        ctx.fillRect(px-1, py-8, 2, 4);

        ctx.fillStyle = '#28f7ff';
        ctx.fillRect(px-8, py+2, 3, 2);
        ctx.fillRect(px+5, py+2, 3, 2);
      }
    }

    for(const p of sparks){
      const col =
        p.col==='c1' ? '#28f7ff' :
        p.col==='c2' ? '#ff2df7' :
        p.col==='c3' ? '#b7ff3c' :
        p.col==='c4' ? '#ffd24a' :
        p.col==='danger' ? '#ff3b3b' : '#ffd24a';

      const a = clamp(p.life/0.8, 0, 1);
      ctx.globalAlpha = 0.85*a;
      ctx.fillStyle = col;
      ctx.fillRect((p.x|0), (p.y|0), 1, 1);
      ctx.globalAlpha = 1;
    }

    ctx.globalAlpha = 0.24;
    ctx.fillStyle = '#ff2df7';
    ctx.fillRect(0, H-10, W, 1);
    ctx.fillRect(0, H-8, W, 1);
    ctx.globalAlpha = 1;

    if(levelUpPause){
      ctx.save();
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;

      ctx.fillStyle = "#28f7ff";
      ctx.font = "bold 20px monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("LEVEL UP !", W/2, H/2);
      ctx.restore();
    }

    // HUD values
    const quota = getWaveQuota(wave);
    hudScore.textContent = score|0;
    hudLives.textContent = player.lives|0;
    hudLevel.textContent = wave|0;
    hudChain.textContent = 'x' + (chain|0);
    hudQuota.textContent = (killsThisWave|0) + "/" + (quota|0);

    if(!running){
      hudStatus.textContent = "Press Enter to start.";
    } else if(paused && !levelUpPause){
      hudStatus.textContent = "Paused.";
    } else if(gameOver){
      hudStatus.textContent = "Game Over. Press Enter.";
    } else {
      hudStatus.textContent = stateMsg; // intentionally minimal
    }
  }

  function loop(ts){
    tNow = ts/1000;
    if(!tLast) tLast = tNow;
    let dt = tNow - tLast;
    tLast = tNow;
    dt = clamp(dt, 0, 1/30);

    if(levelUpPause){
      levelUpTimer -= dt;
      if(levelUpTimer <= 0){
        levelUpPause = false;
        paused = false;
        hudStatus.textContent = "";
      }
    }

    if(running && !paused && !gameOver){
      step(dt);
      tryAdvanceWave();
    } else {
      for(const s of stars){
        s.y += (6 + 18*s.z) * dt;
        if(s.y > H+2){ s.y = -2; s.x = Math.random()*W; }
      }
      for(let i=sparks.length-1;i>=0;i--){
        const p = sparks[i];
        p.t += dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= Math.pow(0.30, dt);
        p.vy *= Math.pow(0.30, dt);
        p.life -= dt;
        if(p.life<=0) sparks.splice(i,1);
      }
    }

    draw();
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
})();
</script>
